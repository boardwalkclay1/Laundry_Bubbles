<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pickup Status – Laundry Bubbles</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #FFF4D9;
            color: #5A3E2B;
        }

        header {
            background: #D96E30;
            padding: 18px;
            text-align: center;
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .box {
            background: white;
            padding: 18px;
            border-radius: 10px;
            border: 2px solid #F4C542;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .btn {
            display: block;
            background: #F4C542;
            padding: 16px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #5A3E2B;
            text-decoration: none;
            border: 2px solid #D96E30;
        }
    </style>
</head>

<body>
    <header>Pickup Status</header>

    <div class="container">
        <div id="statusBox" class="box">
            Loading pickup status…
        </div>

        <a id="confirmBtn" class="btn" style="display:none;">Confirm Pickup</a>
    </div>

    <!-- FIREBASE LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { 
            getFirestore, 
            collection, 
            query, 
            where, 
            getDocs, 
            doc, 
            updateDoc 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRjiZum9L0UGLxDap4duEN3VIPj4PAmvo",
            authDomain: "launrdy-bubbles.firebaseapp.com",
            projectId: "launrdy-bubbles",
            storageBucket: "launrdy-bubbles.firebasestorage.app",
            messagingSenderId: "625079841514",
            appId: "1:625079841514:web:472b2721f4acb836111d93",
            measurementId: "G-QT16Z65J1E"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const statusBox = document.getElementById("statusBox");
        const confirmBtn = document.getElementById("confirmBtn");

        let activeJobId = null;

        async function loadPickupStatus(uid) {
            const jobsRef = collection(db, "jobs");
            const q = query(
                jobsRef,
                where("washerId", "==", uid),
                where("status", "==", "pickup_in_progress")
            );

            const snap = await getDocs(q);

            if (snap.empty) {
                statusBox.textContent = "No active pickups right now.";
                return;
            }

            const job = snap.docs[0];
            activeJobId = job.id;

            const data = job.data();

            statusBox.innerHTML = `
                Pickup in progress…<br>
                <br>
                Customer: <strong>${data.customerName || "Unknown"}</strong><br>
                Address: ${data.pickupAddress || "N/A"}<br>
                <br>
                Confirm once laundry is collected.
            `;

            confirmBtn.style.display = "block";
        }

        async function confirmPickup() {
            if (!activeJobId) return;

            const ref = doc(db, "jobs", activeJobId);
            await updateDoc(ref, {
                status: "pickup_complete",
                pickupConfirmedAt: Date.now()
            });

            window.location.href = "washer_dropoff.html?jobId=" + activeJobId;
        }

        confirmBtn.onclick = confirmPickup;

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }
            loadPickupStatus(user.uid);
        });
    </script>
</body>
</html>
