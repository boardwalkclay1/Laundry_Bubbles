<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Select Pickup Location – Laundry Bubbles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --primary:#4da6ff;
      --accent:#7a5cff;
      --text:#f9fbff;
      --muted:#9aa3c7;
    }
    * {
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:system-ui,sans-serif;
    }

    body {
      background:#030715;
      color:var(--text);
      height:100vh;
      display:flex;
      flex-direction:column;
      padding:14px;
    }

    header {
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }

    .back {
      width:36px;
      height:36px;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      font-size:18px;
    }

    #map {
      flex:1;
      border-radius:18px;
      border:1px solid rgba(255,255,255,0.15);
      overflow:hidden;
      min-height:260px;
    }

    .address-box {
      margin-top:12px;
      background:rgba(255,255,255,0.05);
      padding:12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.12);
    }

    .address-label {
      font-size:12px;
      color:var(--muted);
      margin-bottom:4px;
    }

    .address-value {
      font-size:14px;
      font-weight:600;
    }

    .footer {
      margin-top:10px;
    }

    button {
      margin-top:10px;
      width:100%;
      padding:14px;
      border-radius:999px;
      border:none;
      background:linear-gradient(135deg,var(--primary),var(--accent));
      color:white;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(0,0,0,0.5);
      transition:transform 0.08s ease, box-shadow 0.12s ease, opacity 0.12s ease;
    }

    button:active {
      transform:scale(0.97);
      box-shadow:none;
    }

    button[disabled] {
      opacity:0.5;
      cursor:default;
      box-shadow:none;
      transform:none;
    }

    .message {
      margin-top:8px;
      font-size:12px;
    }
    .message.error { color:#ff6b81; }
    .message.success { color:#4dffb3; }

    .hint {
      font-size:11px;
      color:var(--muted);
      margin-top:4px;
    }
  </style>
</head>

<body>
  <header>
    <div class="back" onclick="window.location.href='request-pickup.html'">←</div>
    <h2>Select Pickup Location</h2>
  </header>

  <div id="map"></div>

  <div class="address-box">
    <div class="address-label">Selected address</div>
    <div class="address-value" id="addressText">
      Move the pin or use your location to choose a pickup spot…
    </div>
  </div>

  <div class="footer">
    <button id="confirmBtn" onclick="saveLocation()" disabled>Confirm location</button>
    <div id="statusMessage" class="message"></div>
    <p class="hint">
      This location will be saved to your account for this pickup. You can always adjust it before confirming your order.
    </p>
  </div>

  <!-- TIP: in production, load this URL with your key injected from env/server, not hard-coded -->
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&libraries=places"></script>

  <script>
    /*
      FRONTEND–BACKEND CONTRACT

      You hook these to your real backend (which can use Firebase, SQL, etc.):

      1) GET  /api/pickup-location
         -> { lat:number, lng:number, address:string }  // last saved pickup location for this user
         or 404/empty body if none

      2) POST /api/pickup-location
         body: { lat:number, lng:number, address:string }
         -> { lat, lng, address }

      Backend identifies the user from your existing auth (cookies/session/token).
      No lat/lng in localStorage anymore; everything lives in your backend.
    */

    let map, marker, geocoder;
    let selectedLat = null;
    let selectedLng = null;
    let selectedAddress = "";

    const addressEl = document.getElementById("addressText");
    const confirmBtn = document.getElementById("confirmBtn");
    const statusMessageEl = document.getElementById("statusMessage");

    function setStatus(message, type){
      statusMessageEl.textContent = message || "";
      statusMessageEl.className = "message" + (type ? " " + type : "");
    }

    function enableConfirm(enabled){
      confirmBtn.disabled = !enabled;
    }

    function initMap() {
      geocoder = new google.maps.Geocoder();

      const defaultPos = { lat: 33.7490, lng: -84.3880 }; // Atlanta baseline

      map = new google.maps.Map(document.getElementById("map"), {
        center: defaultPos,
        zoom: 14,
        styles: [
          { elementType:"geometry", stylers:[{color:"#1d1d2b"}] },
          { elementType:"labels.text.fill", stylers:[{color:"#f9fbff"}] },
          { featureType:"water", stylers:[{color:"#0b0f1a"}] }
        ]
      });

      marker = new google.maps.Marker({
        position: defaultPos,
        map,
        draggable: true,
        icon: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png"
      });

      google.maps.event.addListener(marker, "dragend", function() {
        const pos = marker.getPosition();
        selectedLat = pos.lat();
        selectedLng = pos.lng();
        reverseGeocode(selectedLat, selectedLng);
      });

      // First, try to load any saved location from backend
      loadSavedLocation().then((loaded) => {
        if (!loaded && navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              const userPos = {
                lat: pos.coords.latitude,
                lng: pos.coords.longitude
              };
              map.setCenter(userPos);
              marker.setPosition(userPos);
              selectedLat = userPos.lat;
              selectedLng = userPos.lng;
              reverseGeocode(selectedLat, selectedLng);
            },
            () => {
              // Geolocation denied – keep default center
              setStatus("We couldn't access your location. You can move the pin manually.", "error");
            }
          );
        }
      }).catch(() => {
        // If backend fails, user can still choose a spot manually
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              const userPos = {
                lat: pos.coords.latitude,
                lng: pos.coords.longitude
              };
              map.setCenter(userPos);
              marker.setPosition(userPos);
              selectedLat = userPos.lat;
              selectedLng = userPos.lng;
              reverseGeocode(selectedLat, selectedLng);
            }
          );
        }
      });
    }

    async function loadSavedLocation(){
      try{
        const res = await fetch("/api/pickup-location", {
          method:"GET",
          credentials:"include"
        });
        if(res.status === 404){
          return false;
        }
        if(!res.ok){
          throw new Error("Failed to load saved location.");
        }
        const data = await res.json();
        if(data && data.lat && data.lng && data.address){
          const pos = { lat: data.lat, lng: data.lng };
          map.setCenter(pos);
          marker.setPosition(pos);
          selectedLat = data.lat;
          selectedLng = data.lng;
          selectedAddress = data.address;
          addressEl.textContent = selectedAddress;
          enableConfirm(true);
          return true;
        }
        return false;
      }catch(err){
        console.error(err);
        setStatus("We couldn't load your last pickup location. You can pick a new one.", "error");
        return false;
      }
    }

    function reverseGeocode(lat, lng) {
      enableConfirm(false);
      addressEl.textContent = "Finding address…";

      geocoder.geocode({ location: { lat, lng } }, (results, status) => {
        if (status === "OK" && results[0]) {
          selectedAddress = results[0].formatted_address;
          addressEl.textContent = selectedAddress;
          enableConfirm(true);
          setStatus("", "");
        } else {
          selectedAddress = "";
          addressEl.textContent = "We couldn't find an address here. Try moving the pin slightly.";
          setStatus("Unable to fetch address for this location.", "error");
        }
      });
    }

    async function saveLocation() {
      if (!selectedLat || !selectedLng || !selectedAddress) {
        alert("Please choose a location first.");
        return;
      }

      const loc = {
        lat: selectedLat,
        lng: selectedLng,
        address: selectedAddress
      };

      enableConfirm(false);
      setStatus("Saving location…", "");

      try{
        const res = await fetch("/api/pickup-location", {
          method:"POST",
          headers: { "Content-Type":"application/json" },
          credentials:"include",
          body: JSON.stringify(loc)
        });
        if(!res.ok){
          throw new Error("Failed to save location.");
        }
        await res.json();
        setStatus("Pickup location saved.", "success");
        // Give a tiny pause so the user sees it's saved
        setTimeout(() => {
          window.location.href = "request-pickup.html";
        }, 500);
      }catch(err){
        console.error(err);
        setStatus("We couldn't save your location. Please try again.", "error");
        enableConfirm(true);
      }
    }

    window.saveLocation = saveLocation;
    window.onload = initMap;
  </script>
</body>
</html>
