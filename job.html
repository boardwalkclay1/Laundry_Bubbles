<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Laundry Job – Laundry Bubbles</title>

    <!-- Load Firebase -->
    <script type="module" src="/firebase.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #FFF4D9;
            color: #5A3E2B;
        }

        header {
            background: #D96E30;
            padding: 18px;
            text-align: center;
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .status-box {
            background: white;
            padding: 18px;
            border-radius: 10px;
            border: 2px solid #F4C542;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .btn {
            display: block;
            background: #F4C542;
            padding: 16px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #5A3E2B;
            text-decoration: none;
            border: 2px solid #D96E30;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <header>Your Laundry Job</header>

    <div class="container">
        <div class="status-box" id="statusBox">
            Loading job status...
        </div>

        <a href="client-dashboard.html" class="btn">Back to Dashboard</a>
    </div>

    <script type="module">
        import {
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        import {
            doc,
            getDoc,
            onSnapshot
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const statusBox = document.getElementById("statusBox");

        // -----------------------------
        // GET ORDER ID FROM URL
        // -----------------------------
        function getOrderId() {
            return new URLSearchParams(window.location.search).get("order_id");
        }

        const orderId = getOrderId();

        if (!orderId) {
            statusBox.textContent = "No job found.";
        }

        let currentUser = null;

        // -----------------------------
        // AUTH GUARD
        // -----------------------------
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }

            currentUser = user;
            loadJob();
        });

        // -----------------------------
        // LOAD JOB + REALTIME UPDATES
        // -----------------------------
        function loadJob() {
            const ref = doc(db, "orders", orderId);

            onSnapshot(ref, (snap) => {
                if (!snap.exists()) {
                    statusBox.textContent = "Job not found.";
                    return;
                }

                const order = snap.data();

                // Ensure this job belongs to the logged-in client
                if (order.client_id !== currentUser.uid) {
                    statusBox.textContent = "Unauthorized.";
                    return;
                }

                updateStatus(order);
            });
        }

        // -----------------------------
        // UPDATE STATUS TEXT
        // -----------------------------
        function updateStatus(order) {
            let text = "";

            switch (order.status) {
                case "requested":
                    text = "Waiting for a washer to accept your request.";
                    break;
                case "accepted":
                    text = "A washer has accepted your job! They are on the way.";
                    break;
                case "picked_up":
                    text = "Your laundry has been picked up.";
                    break;
                case "washing":
                    text = "Your laundry is being washed.";
                    break;
                case "drying":
                    text = "Your laundry is drying.";
                    break;
                case "folding":
                    text = "Your laundry is being folded.";
                    break;
                case "delivering":
                    text = "Your laundry is on the way back to you.";
                    break;
                case "completed":
                    text = "Your laundry job is complete!";
                    break;
                case "cancelled":
                    text = "This job has been cancelled.";
                    break;
                default:
                    text = "Status: " + order.status;
            }

            statusBox.textContent = text;
        }
    </script>
</body>
</html>
