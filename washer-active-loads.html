<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
    getAuth, 
    onAuthStateChanged 
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { 
    getFirestore,
    collection,
    query,
    where,
    onSnapshot,
    doc,
    updateDoc,
    addDoc
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyCRjiZum9L0UGLxDap4duEN3VIPj4PAmvo",
    authDomain: "launrdy-bubbles.firebaseapp.com",
    projectId: "launrdy-bubbles",
    storageBucket: "launrdy-bubbles.firebasestorage.app",
    messagingSenderId: "625079841514",
    appId: "1:625079841514:web:472b2721f4acb836111d93",
    measurementId: "G-QT16Z65J1E"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  function openDirections(lat, lng) {
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`, "_blank");
  }

  async function updateStatus(orderId, newStatus, washerId) {
    const ref = doc(db, "orders", orderId);

    await updateDoc(ref, {
      status: newStatus,
      updatedAt: Date.now()
    });

    await addDoc(collection(db, "order_events"), {
      orderId,
      washerId,
      status: newStatus,
      createdAt: Date.now()
    });
  }

  function renderLoads(orders, washerId) {
    const container = document.getElementById("loadsContainer");
    container.innerHTML = "";

    if (orders.length === 0) {
      container.innerHTML = "<p style='font-size:13px;color:var(--muted);'>No active loads right now.</p>";
      return;
    }

    orders.forEach(order => {
      const card = document.createElement("div");
      card.className = "card";

      const time = new Date(order.createdAt || Date.now()).toLocaleString();

      card.innerHTML = `
        <div class="title-row">
          <div class="load-title">${order.clientName || "Client load"}</div>
          <div class="badge">${order.status}</div>
        </div>
        <div class="meta">${order.pickupAddress}</div>
        <div class="meta">Window: ${order.pickupWindow || "Not set"}</div>
        <div class="meta">Created: ${time}</div>
        <div class="meta">${order.notes ? "Notes: " + order.notes : ""}</div>

        <div class="btn-row">
          <button class="btn btn-secondary" data-role="message" data-id="${order.id}">Message</button>
          <button class="btn btn-secondary" data-role="directions" data-id="${order.id}">Directions</button>
          <button class="btn btn-primary" data-role="start" data-id="${order.id}">Start</button>
          <button class="btn btn-primary" data-role="complete" data-id="${order.id}">Complete</button>
          <button class="btn btn-danger" data-role="cancel" data-id="${order.id}">Cancel</button>
        </div>
      `;

      card.addEventListener("click", async (e) => {
        const role = e.target.getAttribute("data-role");
        const id = e.target.getAttribute("data-id");
        if (!role) return;

        if (role === "directions" && order.pickupLat && order.pickupLng) {
          openDirections(order.pickupLat, order.pickupLng);
          return;
        }

        if (role === "start") {
          await updateStatus(id, "in_progress", washerId);
          return;
        }

        if (role === "complete") {
          await updateStatus(id, "delivered", washerId);
          return;
        }

        if (role === "cancel") {
          await updateStatus(id, "canceled", washerId);
          return;
        }

        if (role === "message") {
          window.location.href = `inbox.html?orderId=${id}&clientId=${order.clientId}`;
          return;
        }
      });

      container.appendChild(card);
    });
  }

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "login.html";
      return;
    }

    const q = query(
      collection(db, "orders"),
      where("washerId", "==", user.uid),
      where("status", "!=", "completed")
    );

    onSnapshot(q, (snapshot) => {
      const orders = snapshot.docs.map(doc => ({
        id: doc.id,
        ...doc.data()
      }));

      renderLoads(orders, user.uid);
    });
  });
</script>
