<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chat – Laundry Bubbles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Load Firebase -->
  <script type="module" src="/firebase.js"></script>

  <style>
    :root {
      --primary: #4da6ff;
      --accent: #7a5cff;
      --text: #f9fbff;
      --muted: #9aa3c7;
      --blueBubble: #0b93f6;
      --grayBubble: #e5e5ea;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }

    body {
      background: #030715;
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .back {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
    }

    .warning {
      background: rgba(255,200,0,0.1);
      border-left: 3px solid #ffcc00;
      padding: 10px;
      font-size: 12px;
      color: #ffcc00;
      margin: 10px;
      border-radius: 6px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.3;
      display: inline-block;
    }

    .me {
      align-self: flex-end;
      background: var(--blueBubble);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .them {
      align-self: flex-start;
      background: var(--grayBubble);
      color: black;
      border-bottom-left-radius: 4px;
    }

    .inputBar {
      display: flex;
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    button {
      margin-left: 10px;
      padding: 10px 16px;
      border-radius: 20px;
      border: none;
      background: var(--primary);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <header>
    <div class="back" onclick="window.location.href='inbox.html'">←</div>
    <h2 id="chatName">Chat</h2>
  </header>

  <div class="warning">
    ⚠️ Safety Notice: Harassment, threats, or inappropriate behavior will result in permanent account removal.
  </div>

  <div id="messages"></div>

  <div class="inputBar">
    <input id="msgInput" placeholder="Message…" />
    <button onclick="sendMessage()">Send</button>
  </div>

  <script type="module">
    import {
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    import {
      doc,
      collection,
      addDoc,
      onSnapshot,
      updateDoc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    let currentUser = null;
    let conversationId = localStorage.getItem("lb_active_conversation");

    const messagesBox = document.getElementById("messages");
    const chatName = document.getElementById("chatName");

    if (!conversationId) {
      messagesBox.innerHTML = "<p style='color:var(--muted);'>Conversation not found.</p>";
    }

    // -----------------------------
    // AUTH GUARD
    // -----------------------------
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = user;

      // Load conversation metadata
      const convRef = doc(db, "conversations", conversationId);
      const convSnap = await getDoc(convRef);

      if (!convSnap.exists()) {
        messagesBox.innerHTML = "<p style='color:var(--muted);'>Conversation not found.</p>";
        return;
      }

      const convData = convSnap.data();
      chatName.textContent = convData.otherName || "Chat";

      // Start realtime listener
      listenForMessages();
    });

    // -----------------------------
    // REALTIME MESSAGE LISTENER
    // -----------------------------
    function listenForMessages() {
      const msgsRef = collection(db, "conversations", conversationId, "messages");

      onSnapshot(msgsRef, (snapshot) => {
        messagesBox.innerHTML = "";

        snapshot.docs
          .sort((a, b) => a.data().timestamp - b.data().timestamp)
          .forEach((doc) => {
            const m = doc.data();
            const div = document.createElement("div");
            div.className = "bubble " + (m.senderId === currentUser.uid ? "me" : "them");
            div.textContent = m.text;
            messagesBox.appendChild(div);
          });

        messagesBox.scrollTop = messagesBox.scrollHeight;
      });
    }

    // -----------------------------
    // SEND MESSAGE
    // -----------------------------
    window.sendMessage = async function () {
      const input = document.getElementById("msgInput");
      const text = input.value.trim();
      if (!text) return;

      const msgRef = collection(db, "conversations", conversationId, "messages");

      await addDoc(msgRef, {
        senderId: currentUser.uid,
        text,
        timestamp: Date.now()
      });

      // Update conversation metadata
      await updateDoc(doc(db, "conversations", conversationId), {
        lastMessage: text,
        lastTimestamp: Date.now()
      });

      input.value = "";
    };
  </script>
</body>
</html>
