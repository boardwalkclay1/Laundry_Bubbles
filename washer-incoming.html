<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Incoming Order – Laundry Bubbles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin:0;
      font-family:Arial,sans-serif;
      background:linear-gradient(135deg,#d96e30,#f4c542);
      min-height:100vh;
      padding:20px;
      color:#5a3e2b;
    }
    h1 { text-align:center; margin-bottom:20px; }
    .card {
      background:#fff4d9;
      padding:20px;
      border-radius:16px;
      box-shadow:0 6px 16px rgba(0,0,0,0.25);
      max-width:520px;
      margin:0 auto;
    }
    .label { font-weight:bold; }
    .btn {
      display:block;
      width:100%;
      padding:14px;
      background:#d96e30;
      color:white;
      text-align:center;
      border-radius:10px;
      font-weight:bold;
      text-decoration:none;
      margin-top:14px;
      border:none;
      cursor:pointer;
    }
    .decline { background:#b83a2e; }
    .accept { background:#3a9e3a; }
  </style>
</head>

<body>
  <h1>New Order Request</h1>

  <div class="card" id="orderCard">Loading...</div>

  <button class="btn accept" id="acceptBtn">Accept Order</button>
  <button class="btn decline" id="declineBtn">Decline Order</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getAuth, 
      onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { 
      getFirestore,
      collection,
      query,
      where,
      orderBy,
      limit,
      getDocs,
      doc,
      updateDoc,
      addDoc,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCRjiZum9L0UGLxDap4duEN3VIPj4PAmvo",
      authDomain: "launrdy-bubbles.firebaseapp.com",
      projectId: "launrdy-bubbles",
      storageBucket: "launrdy-bubbles.firebasestorage.app",
      messagingSenderId: "625079841514",
      appId: "1:625079841514:web:472b2721f4acb836111d93",
      measurementId: "G-QT16Z65J1E"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentOrder = null;

    const orderCard = document.getElementById("orderCard");
    const acceptBtn = document.getElementById("acceptBtn");
    const declineBtn = document.getElementById("declineBtn");

    async function loadIncoming(uid) {
      const ref = collection(db, "orders");

      const q = query(
        ref,
        where("washerId", "==", uid),
        where("status", "==", "pending_acceptance"),
        orderBy("createdAt", "desc"),
        limit(1)
      );

      const snap = await getDocs(q);

      if (snap.empty) {
        orderCard.innerText = "No incoming orders.";
        acceptBtn.style.display = "none";
        declineBtn.style.display = "none";
        return;
      }

      const docSnap = snap.docs[0];
      currentOrder = { id: docSnap.id, ...docSnap.data() };

      renderOrder();

      // Real-time updates for THIS order
      const orderRef = doc(db, "orders", currentOrder.id);
      onSnapshot(orderRef, (updateSnap) => {
        if (!updateSnap.exists()) return;

        const updated = updateSnap.data();

        // If assigned to someone else
        if (updated.washerId !== uid) {
          alert("This order was assigned to another washer.");
          window.location.href = "washer-orders.html";
        }

        // If status changed away from pending_acceptance
        if (updated.status !== "pending_acceptance") {
          window.location.href = "washer-orders.html";
        }
      });
    }

    function renderOrder() {
      const pickup = currentOrder.pickupTime
        ? new Date(currentOrder.pickupTime).toLocaleString()
        : "Not set";

      orderCard.innerHTML = `
        <div><span class="label">Order ID:</span> #${currentOrder.id}</div>
        <div><span class="label">Loads:</span> ${currentOrder.loads || 0}</div>
        <div><span class="label">Pickup:</span> ${pickup}</div>
        <div><span class="label">Notes:</span> ${currentOrder.notes || "None"}</div>
      `;
    }

    async function acceptOrder(uid) {
      const ref = doc(db, "orders", currentOrder.id);

      await updateDoc(ref, {
        status: "accepted"
      });

      await addDoc(collection(db, "order_events"), {
        orderId: currentOrder.id,
        washerId: uid,
        status: "accepted",
        message: "Washer accepted the order.",
        createdAt: Date.now()
      });

      window.location.href = `washer-order-page.html?order_id=${currentOrder.id}`;
    }

    async function declineOrder(uid) {
      await addDoc(collection(db, "order_events"), {
        orderId: currentOrder.id,
        washerId: uid,
        status: "declined",
        message: "Washer declined the order.",
        createdAt: Date.now()
      });

      const ref = doc(db, "orders", currentOrder.id);

      await updateDoc(ref, {
        washerId: null
      });

      alert("Order declined. Searching for next washer.");
      window.location.href = "washer-orders.html";
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      loadIncoming(user.uid);

      acceptBtn.onclick = () => acceptOrder(user.uid);
      declineBtn.onclick = () => declineOrder(user.uid);
    });
  </script>
</body>
</html>
