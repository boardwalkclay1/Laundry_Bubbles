<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Load Firebase -->
  <script type="module" src="/firebase.js"></script>
</head>

<body style="font-family:Arial; padding:20px;">

  <h1>Dashboard</h1>
  <p id="welcome">Loading...</p>

  <button id="logoutBtn" style="padding:10px; margin-top:10px;">Log Out</button>

  <div id="adminTools" style="display:none; margin-top:20px;">
    <h2>Admin Tools</h2>
    <button onclick="window.location.href='admin-dashboard.html'" style="padding:10px;">
      Go to Admin Dashboard
    </button>
  </div>

  <script type="module">
    import {
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    import {
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const welcome = document.getElementById("welcome");
    const adminTools = document.getElementById("adminTools");
    const logoutBtn = document.getElementById("logoutBtn");

    // Your super admin username or UID
    const SUPER_ADMIN = "boardwalkclay1";

    // -----------------------------
    // AUTH GUARD + LOAD USER PROFILE
    // -----------------------------
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      // Load Firestore user profile
      const ref = doc(db, "users", user.uid);
      const snap = await getDoc(ref);

      if (!snap.exists()) {
        welcome.textContent = "Welcome!";
        return;
      }

      const data = snap.data();
      const name = data.name || "User";

      welcome.textContent = `Welcome, ${name}`;

      // Check admin
      if (data.username === SUPER_ADMIN || data.role === "admin") {
        adminTools.style.display = "block";
      }
    });

    // -----------------------------
    // LOGOUT
    // -----------------------------
    logoutBtn.onclick = async () => {
      await signOut(auth);
      window.location.href = "login.html";
    };
  </script>

</body>
</html>
