<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Washer Availability – Laundry Bubbles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin:0;
      font-family:Arial,sans-serif;
      background:linear-gradient(135deg,#d96e30,#f4c542);
      min-height:100vh;
      padding:20px;
      color:#5a3e2b;
    }
    h1 { text-align:center; margin-bottom:20px; }
    .card {
      background:#fff4d9;
      padding:20px;
      border-radius:16px;
      box-shadow:0 6px 16px rgba(0,0,0,0.25);
      max-width:520px;
      margin:0 auto;
    }
    .day {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin:10px 0;
    }
    .btn {
      display:block;
      width:100%;
      padding:14px;
      background:#d96e30;
      color:white;
      text-align:center;
      border-radius:10px;
      font-weight:bold;
      text-decoration:none;
      margin-top:14px;
      border:none;
      cursor:pointer;
    }
    .secondary {
      background:#f4c542;
      color:#5a3e2b;
      border:2px solid #d96e30;
    }
  </style>
</head>

<body>
  <h1>Weekly Availability</h1>

  <div class="card" id="availabilityCard">
    Loading...
  </div>

  <a class="btn secondary" href="washer-dashboard.html">Back to Washer Dashboard</a>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getAuth, 
      onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { 
      getFirestore,
      doc,
      getDoc,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // -----------------------------
    // Firebase Config
    // -----------------------------
    const firebaseConfig = {
      apiKey: "AIzaSyCRjiZum9L0UGLxDap4duEN3VIPj4PAmvo",
      authDomain: "launrdy-bubbles.firebaseapp.com",
      projectId: "launrdy-bubbles",
      storageBucket: "launrdy-bubbles.firebasestorage.app",
      messagingSenderId: "625079841514",
      appId: "1:625079841514:web:472b2721f4acb836111d93",
      measurementId: "G-QT16Z65J1E"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const days = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
    let userRef = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      userRef = doc(db, "users", user.uid);
      loadAvailability();
    });

    async function loadAvailability() {
      const card = document.getElementById("availabilityCard");

      const snap = await getDoc(userRef);
      if (!snap.exists()) {
        card.innerText = "Profile not found.";
        return;
      }

      const data = snap.data();
      const availability = data.availability || {};

      card.innerHTML = "";

      days.forEach(day => {
        const row = document.createElement("div");
        row.className = "day";

        row.innerHTML = `
          <span>${day}</span>
          <input type="checkbox" id="${day}" ${availability[day] ? "checked" : ""}>
        `;

        card.appendChild(row);
      });

      const saveBtn = document.createElement("button");
      saveBtn.className = "btn";
      saveBtn.innerText = "Save Availability";
      saveBtn.onclick = saveAvailability;

      card.appendChild(saveBtn);
    }

    async function saveAvailability() {
      const availability = {};
      days.forEach(day => {
        availability[day] = document.getElementById(day).checked;
      });

      await updateDoc(userRef, { availability });

      alert("Availability updated!");
    }
  </script>
</body>
</html>
