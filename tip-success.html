<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tip Added – Laundry Bubbles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>

    body{
      min-height:100vh;
      background:

      display:flex;
      flex-direction:column;

      background:linear-gradient(135deg,var(--primary),var(--accent));
      color:white;
      font-weight:600;
