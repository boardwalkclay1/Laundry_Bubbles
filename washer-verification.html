<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Washer Verification – Laundry Bubbles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin:0;
      font-family:Arial,sans-serif;
      background:linear-gradient(135deg,#d96e30,#f4c542);
      min-height:100vh;
      padding:20px;
      color:#5a3e2b;
    }
    h1 { text-align:center; margin-bottom:20px; }
    .card {
      background:#fff4d9;
      padding:20px;
      border-radius:16px;
      box-shadow:0 6px 16px rgba(0,0,0,0.25);
      max-width:520px;
      margin:0 auto;
    }
    label { font-weight:bold; display:block; margin-top:10px; }
    input, textarea {
      width:100%;
      padding:12px;
      margin-top:6px;
      border-radius:10px;
      border:2px solid #d96e30;
      background:white;
      box-sizing:border-box;
    }
    textarea { height:80px; resize:none; }
    .btn {
      display:block;
      width:100%;
      padding:14px;
      background:#d96e30;
      color:white;
      text-align:center;
      border-radius:10px;
      font-weight:bold;
      text-decoration:none;
      margin-top:14px;
      border:none;
      cursor:pointer;
    }
    .secondary {
      background:#f4c542;
      color:#5a3e2b;
      border:2px solid #d96e30;
    }
    .status-box {
      padding:10px;
      background:#ffe9b8;
      border-radius:10px;
      margin-bottom:10px;
      font-weight:bold;
      text-align:center;
    }
  </style>
</head>

<body>
  <h1>Washer Verification</h1>

  <div class="card">
    <div id="statusBox" class="status-box">Loading status...</div>

    <label>Full Legal Name</label>
    <input id="fullName">

    <label>City</label>
    <input id="city">

    <label>Experience</label>
    <textarea id="experience"></textarea>

    <label>Transportation</label>
    <input id="transport">

    <label>ID Note (last 4 digits or description)</label>
    <input id="idNote">

    <button class="btn" id="submitBtn">Submit For Review</button>
    <a class="btn secondary" href="washer-dashboard.html">Back to Washer Dashboard</a>
  </div>

  <!-- FIREBASE VERSION -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCRjiZum9L0UGLxDap4duEN3VIPj4PAmvo",
      authDomain: "launrdy-bubbles.firebaseapp.com",
      projectId: "launrdy-bubbles",
      storageBucket: "launrdy-bubbles.firebasestorage.app",
      messagingSenderId: "625079841514",
      appId: "1:625079841514:web:472b2721f4acb836111d93",
      measurementId: "G-QT16Z65J1E"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const statusBox = document.getElementById("statusBox");
    const submitBtn = document.getElementById("submitBtn");

    const fullName = document.getElementById("fullName");
    const city = document.getElementById("city");
    const experience = document.getElementById("experience");
    const transport = document.getElementById("transport");
    const idNote = document.getElementById("idNote");

    function lockForm(message) {
      statusBox.innerText = message;
      fullName.disabled = true;
      city.disabled = true;
      experience.disabled = true;
      transport.disabled = true;
      idNote.disabled = true;
      submitBtn.disabled = true;
    }

    async function loadVerification(uid) {
      const ref = doc(db, "users", uid);
      const snap = await getDoc(ref);

      if (!snap.exists()) {
        statusBox.innerText = "Not submitted yet.";
        return;
      }

      const data = snap.data();

      fullName.value = data.verification_full_name || "";
      city.value = data.verification_city || "";
      experience.value = data.verification_experience || "";
      transport.value = data.verification_transport || "";
      idNote.value = data.verification_id_note || "";

      if (data.verification_status === "pending") {
        lockForm("Your verification is under review.");
      } else if (data.verification_status === "approved") {
        lockForm("You are approved as a washer!");
      } else if (data.verification_status === "rejected") {
        statusBox.innerText = "Your verification was rejected. Please update and resubmit.";
      } else {
        statusBox.innerText = "Not submitted yet.";
      }
    }

    async function submitVerification(uid) {
      const ref = doc(db, "users", uid);

      await setDoc(ref, {
        verification_full_name: fullName.value.trim(),
        verification_city: city.value.trim(),
        verification_experience: experience.value.trim(),
        verification_transport: transport.value.trim(),
        verification_id_note: idNote.value.trim(),
        verification_status: "pending"
      }, { merge: true });

      alert("Verification submitted!");
      location.reload();
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      loadVerification(user.uid);

      submitBtn.onclick = () => submitVerification(user.uid);
    });
  </script>
</body>
</html>
