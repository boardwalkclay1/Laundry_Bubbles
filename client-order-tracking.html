<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Track Order – Laundry Bubbles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Load Firebase -->
  <script type="module" src="/firebase.js"></script>

  <style>
    body {
      margin:0;
      font-family:Arial,sans-serif;
      background:linear-gradient(135deg,#d96e30,#f4c542);
      min-height:100vh;
      padding:20px;
      color:#5a3e2b;
    }
    h1 { text-align:center; margin-bottom:20px; }
    .card {
      background:#fff4d9;
      padding:20px;
      border-radius:16px;
      box-shadow:0 6px 16px rgba(0,0,0,0.25);
      max-width:520px;
      margin:0 auto 14px;
    }
    .status {
      font-size:1.1rem;
      font-weight:bold;
      margin-bottom:10px;
    }
    .event {
      padding:8px 0;
      border-bottom:1px solid rgba(0,0,0,0.1);
      font-size:0.95rem;
    }
    .event:last-child { border-bottom:none; }
    .event-time {
      font-size:0.8rem;
      opacity:0.8;
    }
    .btn {
      display:block;
      width:100%;
      padding:14px;
      background:#d96e30;
      color:white;
      text-align:center;
      border-radius:10px;
      font-weight:bold;
      text-decoration:none;
      margin:10px auto 0;
      max-width:520px;
    }
    .secondary {
      background:#f4c542;
      color:#5a3e2b;
      border:2px solid #d96e30;
    }
  </style>
</head>

<body>
  <h1>Track Your Order</h1>

  <div class="card" id="orderSummary">
    Loading order...
  </div>

  <div class="card">
    <h2>Activity</h2>
    <div id="eventsContainer">Loading activity...</div>
  </div>

  <a class="btn secondary" id="backLink">Back to Order</a>
  <a class="btn" href="client-orders.html">Back to My Orders</a>

  <script type="module">
    import {
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    import {
      doc,
      getDoc,
      collection,
      query,
      where,
      orderBy,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // -----------------------------
    // GET ORDER ID FROM URL
    // -----------------------------
    function getOrderIdFromQuery() {
      const params = new URLSearchParams(window.location.search);
      return params.get("order_id");
    }

    const orderId = getOrderIdFromQuery();
    const orderSummary = document.getElementById("orderSummary");
    const eventsContainer = document.getElementById("eventsContainer");
    const backLink = document.getElementById("backLink");

    if (orderId) {
      backLink.href = `client-order-detail.html?order_id=${orderId}`;
    } else {
      backLink.style.display = "none";
    }

    let currentUser = null;

    // -----------------------------
    // AUTH GUARD
    // -----------------------------
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = user;

      await loadOrder();
      await loadEvents();
    });

    // -----------------------------
    // LOAD ORDER SUMMARY
    // -----------------------------
    async function loadOrder() {
      if (!orderId) {
        orderSummary.innerText = "Missing order ID.";
        return;
      }

      const ref = doc(db, "orders", orderId);
      const snap = await getDoc(ref);

      if (!snap.exists()) {
        orderSummary.innerText = "Order not found.";
        return;
      }

      const order = snap.data();

      if (order.client_id !== currentUser.uid) {
        orderSummary.innerText = "Unauthorized.";
        return;
      }

      const pickup = order.pickup_time
        ? new Date(order.pickup_time).toLocaleString()
        : "Not set";

      orderSummary.innerHTML = `
        <div class="status">Status: ${order.status}</div>
        <div>Order ID: #${orderId}</div>
        <div>Loads: ${order.loads}</div>
        <div>Pickup Time: ${pickup}</div>
      `;
    }

    // -----------------------------
    // LOAD ORDER EVENTS
    // -----------------------------
    async function loadEvents() {
      if (!orderId) {
        eventsContainer.innerText = "Missing order ID.";
        return;
      }

      const eventsRef = collection(db, "order_events");
      const q = query(
        eventsRef,
        where("order_id", "==", orderId),
        orderBy("created_at", "asc")
      );

      const snap = await getDocs(q);

      if (snap.empty) {
        eventsContainer.innerText =
          "No activity yet. Your order will update as it moves through each step.";
        return;
      }

      eventsContainer.innerHTML = "";

      snap.docs.forEach((docSnap) => {
        const event = docSnap.data();
        const time = new Date(event.created_at).toLocaleString();

        const div = document.createElement("div");
        div.className = "event";
        div.innerHTML = `
          <div><strong>${event.status || "Update"}</strong> – ${event.message || ""}</div>
          <div class="event-time">${time}</div>
        `;
        eventsContainer.appendChild(div);
      });
    }
  </script>
</body>
</html>
