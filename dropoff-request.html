<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropoff Request – Laundry Bubbles</title>

    <!-- Load Firebase -->
    <script type="module" src="/firebase.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #FFF4D9;
            color: #5A3E2B;
        }

        header {
            background: #D96E30;
            padding: 18px;
            text-align: center;
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 14px;
            border-radius: 10px;
            border: 2px solid #D96E30;
        }

        .btn {
            display: block;
            background: #F4C542;
            padding: 16px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #5A3E2B;
            text-decoration: none;
            border: 2px solid #D96E30;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <header>Dropoff Request</header>

    <div class="container">
        <input id="address" type="text" placeholder="Dropoff Address">
        <input id="time" type="text" placeholder="Preferred Time">
        <textarea id="notes" placeholder="Special Instructions"></textarea>

        <button class="btn" id="submitBtn">Submit Request</button>
    </div>

    <script type="module">
        import {
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        import {
            collection,
            addDoc
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let currentUser = null;

        // -----------------------------
        // AUTH GUARD
        // -----------------------------
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }
            currentUser = user;
        });

        // -----------------------------
        // SUBMIT DROP-OFF REQUEST
        // -----------------------------
        document.getElementById("submitBtn").onclick = async () => {
            const address = document.getElementById("address").value.trim();
            const time = document.getElementById("time").value.trim();
            const notes = document.getElementById("notes").value.trim();

            if (!address || !time) {
                alert("Please fill out the address and preferred time.");
                return;
            }

            const docRef = await addDoc(collection(db, "dropoff_requests"), {
                client_id: currentUser.uid,
                address,
                preferred_time: time,
                notes,
                status: "pending_dropoff",
                created_at: Date.now()
            });

            // Redirect to confirmation page
            window.location.href = `job.html?request_id=${docRef.id}`;
        };
    </script>
</body>
</html>
