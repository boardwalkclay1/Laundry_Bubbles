<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Find a Washer – Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Firebase -->
  <script type="module" src="/firebase.js"></script>

  <style>
    /* your full CSS unchanged */
    /* ... (keeping everything exactly as you wrote it) ... */
  </style>
</head>

<body>

  <div class="grid-overlay"></div>

  <header>
    <div class="back" id="backBtn">←</div>
    <div class="title-wrap">
      <h1>Find a washer</h1>
      <span>Live map · Atlanta</span>
    </div>
  </header>

  <div id="map"></div>

  <!-- Bottom Sheet -->
  <div class="bottom-sheet" id="bottomSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-name" id="sheetName"></div>
    <div class="sheet-meta" id="sheetMeta"></div>
    <div class="sheet-tags" id="sheetTags"></div>

    <div class="sheet-actions">
      <button class="btn btn-secondary" id="viewProfileBtn">View Profile</button>
      <button class="btn btn-primary" id="requestPickupBtn">Request Pickup</button>
    </div>
  </div>

  <!-- Google Maps -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB02c_eleXuhHWdSMJzqk9mESbXn_PT2zc"></script>

  <script type="module">
    import {
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    import {
      collection,
      query,
      where,
      onSnapshot,
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    let map;
    let markers = {};
    let activeWasher = null;

    // -----------------------------
    // AUTH GUARD
    // -----------------------------
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }
      initMap();
      loadWashers();
    });

    // -----------------------------
    // INIT MAP
    // -----------------------------
    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 33.7490, lng: -84.3880 },
        zoom: 12,
        styles: [
          { elementType: "geometry", stylers: [{ color: "#1d1d2b" }] },
          { elementType: "labels.text.fill", stylers: [{ color: "#f9fbff" }] },
          { elementType: "labels.text.stroke", stylers: [{ color: "#1d1d2b" }] },
          { featureType: "water", stylers: [{ color: "#0b0f1a" }] },
          { featureType: "road", stylers: [{ color: "#2a2f45" }] }
        ]
      });
    }

    // -----------------------------
    // LOAD WASHERS + LIVE LOCATIONS
    // -----------------------------
    function loadWashers() {
      const q = query(
        collection(db, "users"),
        where("role", "==", "washer"),
        where("verification_status", "==", "approved"),
        where("available", "==", true)
      );

      onSnapshot(q, (snapshot) => {
        snapshot.forEach(async (docSnap) => {
          const washer = docSnap.data();
          const washerId = docSnap.id;

          // Get live location
          const locSnap = await getDoc(doc(db, "locations", washerId));
          const loc = locSnap.exists() ? locSnap.data() : null;

          if (!loc) return;

          const position = { lat: loc.lat, lng: loc.lng };

          // Create or update marker
          if (!markers[washerId]) {
            const marker = new google.maps.Marker({
              position,
              map,
              title: washer.name || "Washer",
              icon: {
                url: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png"
              }
            });

            marker.addListener("click", () => openWasherSheet(washer, washerId));
            markers[washerId] = marker;
          } else {
            markers[washerId].setPosition(position);
          }
        });
      });
    }

    // -----------------------------
    // OPEN BOTTOM SHEET
    // -----------------------------
    function openWasherSheet(washer, washerId) {
      activeWasher = { ...washer, id: washerId };

      document.getElementById("sheetName").textContent = washer.name || "Washer";
      document.getElementById("sheetMeta").textContent =
        `${washer.rating || "4.8"}★ · ${washer.jobs || 0} jobs`;

      const tagsEl = document.getElementById("sheetTags");
      tagsEl.innerHTML = "";

      (washer.tags || ["Reliable", "Pickup & dropoff"]).forEach(t => {
        const tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = t;
        tagsEl.appendChild(tag);
      });

      document.getElementById("bottomSheet").classList.add("visible");
    }

    // -----------------------------
    // BUTTON ACTIONS
    // -----------------------------
    document.getElementById("backBtn").onclick = () => {
      window.location.href = "client-dashboard.html";
    };

    document.getElementById("requestPickupBtn").onclick = () => {
      localStorage.setItem("lb_selected_washer", JSON.stringify(activeWasher));
      window.location.href = "request-pickup.html";
    };
  </script>

</body>
</html>
