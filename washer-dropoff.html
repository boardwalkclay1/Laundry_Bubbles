<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropoff Status – Laundry Bubbles</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #FFF4D9;
            color: #5A3E2B;
        }

        header {
            background: #D96E30;
            padding: 18px;
            text-align: center;
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .box {
            background: white;
            padding: 18px;
            border-radius: 10px;
            border: 2px solid #F4C542;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .btn {
            display: block;
            background: #F4C542;
            padding: 16px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #5A3E2B;
            text-decoration: none;
            border: 2px solid #D96E30;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <header>Dropoff Status</header>

    <div class="container">
        <div class="box">
            Dropoff in progress…  
            Confirm once laundry is delivered.
        </div>

        <button class="btn" id="confirmBtn">Confirm Dropoff</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { 
            getFirestore,
            doc,
            updateDoc,
            addDoc,
            collection
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // -----------------------------
        // Firebase Config
        // -----------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyCRjiZum9L0UGLxDap4duEN3VIPj4PAmvo",
            authDomain: "launrdy-bubbles.firebaseapp.com",
            projectId: "launrdy-bubbles",
            storageBucket: "launrdy-bubbles.firebasestorage.app",
            messagingSenderId: "625079841514",
            appId: "1:625079841514:web:472b2721f4acb836111d93",
            measurementId: "G-QT16Z65J1E"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const orderId = new URLSearchParams(window.location.search).get("orderId");

        async function confirmDropoff(uid) {
            const ref = doc(db, "orders", orderId);

            // Update order status
            await updateDoc(ref, {
                status: "delivered",
                deliveredAt: Date.now()
            });

            // Log event
            await addDoc(collection(db, "order_events"), {
                orderId,
                washerId: uid,
                status: "delivered",
                message: "Washer confirmed dropoff.",
                createdAt: Date.now()
            });

            alert("Dropoff confirmed!");
            window.location.href = "washer-dashboard.html";
        }

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }

            document.getElementById("confirmBtn").onclick = () => {
                confirmDropoff(user.uid);
            };
        });
    </script>
</body>
</html>
