<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Washer Orders – Laundry Bubbles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin:0;
      font-family:Arial,sans-serif;
      background:linear-gradient(135deg,#d96e30,#f4c542);
      min-height:100vh;
      padding:20px;
      color:#5a3e2b;
    }
    h1 { text-align:center; margin-bottom:20px; }
    .card {
      background:#fff4d9;
      padding:16px;
      border-radius:16px;
      box-shadow:0 6px 16px rgba(0,0,0,0.25);
      max-width:520px;
      margin:0 auto 12px;
      cursor:pointer;
    }
    .meta { font-size:0.9rem; opacity:0.8; }
  </style>
</head>

<body>
  <h1>Your Orders</h1>

  <div id="ordersContainer">Loading...</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getAuth, 
      onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { 
      getFirestore,
      collection,
      query,
      where,
      orderBy,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCRjiZum9L0UGLxDap4duEN3VIPj4PAmvo",
      authDomain: "launrdy-bubbles.firebaseapp.com",
      projectId: "launrdy-bubbles",
      storageBucket: "launrdy-bubbles.firebasestorage.app",
      messagingSenderId: "625079841514",
      appId: "1:625079841514:web:472b2721f4acb836111d93",
      measurementId: "G-QT16Z65J1E"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const container = document.getElementById("ordersContainer");

    function renderOrders(orders) {
      container.innerHTML = "";

      if (orders.length === 0) {
        container.innerHTML = "<p>No orders yet.</p>";
        return;
      }

      orders.forEach(order => {
        const pickup = order.pickupTime
          ? new Date(order.pickupTime).toLocaleString()
          : "Not set";

        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <strong>Order #${order.id}</strong><br>
          <div class="meta">
            Status: ${order.status}<br>
            Loads: ${order.loads || 0}<br>
            Pickup: ${pickup}
          </div>
        `;

        div.onclick = () => {
          if (order.status === "pending_acceptance") {
            window.location.href = "washer-incoming.html";
          } else {
            window.location.href = `washer-order-page.html?order_id=${order.id}`;
          }
        };

        container.appendChild(div);
      });
    }

    function subscribeToOrders(uid) {
      const ordersRef = collection(db, "orders");

      const q = query(
        ordersRef,
        where("washerId", "==", uid),
        orderBy("createdAt", "desc")
      );

      onSnapshot(q, (snapshot) => {
        const orders = snapshot.docs.map(doc => ({
          id: doc.id,
          ...doc.data()
        }));

        renderOrders(orders);
      });
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      subscribeToOrders(user.uid);
    });
  </script>
</body>
</html>
