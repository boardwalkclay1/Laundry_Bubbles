<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Notifications – Laundry Bubbles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Firebase -->
  <script type="module" src="/firebase.js"></script>

  <style>
    body {
      margin:0;
      font-family:Arial,sans-serif;
      background:linear-gradient(135deg,#d96e30,#f4c542);
      min-height:100vh;
      padding:20px;
      color:#5a3e2b;
    }
    h1 { text-align:center; margin-bottom:20px; }
    .card {
      background:#fff4d9;
      padding:16px;
      border-radius:16px;
      box-shadow:0 6px 16px rgba(0,0,0,0.25);
      max-width:520px;
      margin:0 auto 12px;
      cursor:pointer;
    }
    .title { font-weight:bold; font-size:1.1rem; }
    .time { font-size:0.8rem; opacity:0.7; margin-top:4px; }
    .unread {
      border-left:6px solid #d96e30;
      padding-left:10px;
    }
    .btn {
      display:block;
      width:100%;
      padding:14px;
      background:#d96e30;
      color:white;
      text-align:center;
      border-radius:10px;
      font-weight:bold;
      text-decoration:none;
      margin-top:14px;
      border:none;
      cursor:pointer;
      max-width:520px;
      margin-left:auto;
      margin-right:auto;
    }
  </style>
</head>

<body>
  <h1>Your Notifications</h1>

  <div id="notifContainer">Loading...</div>

  <button class="btn" id="markAllBtn">Mark All Read</button>
  <a class="btn" href="client-dashboard.html">Back to Dashboard</a>

  <script type="module">
    import {
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    import {
      collection,
      query,
      where,
      orderBy,
      onSnapshot,
      doc,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    let currentUser = null;
    const container = document.getElementById("notifContainer");

    // -----------------------------
    // AUTH GUARD
    // -----------------------------
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }
      currentUser = user;
      loadNotifications();
    });

    // -----------------------------
    // LOAD NOTIFICATIONS (REALTIME)
    // -----------------------------
    function loadNotifications() {
      const q = query(
        collection(db, "notifications"),
        where("user_id", "==", currentUser.uid),
        orderBy("created_at", "desc")
      );

      onSnapshot(q, (snapshot) => {
        if (snapshot.empty) {
          container.innerHTML = "<div class='card'>No notifications yet.</div>";
          return;
        }

        container.innerHTML = "";

        snapshot.forEach((docSnap) => {
          const n = docSnap.data();
          const id = docSnap.id;

          const div = document.createElement("div");
          div.className = "card " + (n.read ? "" : "unread");

          const time = n.created_at
            ? new Date(n.created_at).toLocaleString()
            : "";

          div.innerHTML = `
            <div class="title">${n.title}</div>
            <div>${n.message}</div>
            <div class="time">${time}</div>
          `;

          div.onclick = () => markRead(id);
          container.appendChild(div);
        });
      });
    }

    // -----------------------------
    // MARK SINGLE NOTIFICATION READ
    // -----------------------------
    async function markRead(id) {
      await updateDoc(doc(db, "notifications", id), {
        read: true
      });
    }

    // -----------------------------
    // MARK ALL READ
    // -----------------------------
    document.getElementById("markAllBtn").onclick = async () => {
      const q = query(
        collection(db, "notifications"),
        where("user_id", "==", currentUser.uid)
      );

      onSnapshot(q, (snapshot) => {
        snapshot.forEach(async (docSnap) => {
          await updateDoc(doc(db, "notifications", docSnap.id), {
            read: true
          });
        });
      });
    };
  </script>
</body>
</html>
