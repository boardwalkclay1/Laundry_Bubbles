<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
    getAuth, 
    onAuthStateChanged 
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { 
    getFirestore,
    collection,
    query,
    where,
    onSnapshot
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyCRjiZum9L0UGLxDap4duEN3VIPj4PAmvo",
    authDomain: "launrdy-bubbles.firebaseapp.com",
    projectId: "launrdy-bubbles",
    storageBucket: "launrdy-bubbles.firebasestorage.app",
    messagingSenderId: "625079841514",
    appId: "1:625079841514:web:472b2721f4acb836111d93",
    measurementId: "G-QT16Z65J1E"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  function nav(page) {
    window.location.href = page;
  }

  document.getElementById("backBtn").onclick = () => nav("client-dashboard.html");

  function renderOrders(orders) {
    const container = document.getElementById("ordersContainer");
    container.innerHTML = "";

    if (orders.length === 0) {
      container.innerHTML = "<p class='empty'>You have no orders yet.</p>";
      return;
    }

    orders.forEach(order => {
      const card = document.createElement("div");
      card.className = "order-card";

      const statusClass = order.status.toLowerCase().replace(" ", "_");

      card.innerHTML = `
        <div class="order-title">${order.pickupAddress || "Pickup Request"}</div>
        <div class="status-badge ${statusClass}">${order.status}</div>
        <div class="order-meta">
          Pickup Window: ${order.pickupWindow || "Not set"}<br>
          Notes: ${order.notes || "None"}<br>
          Created: ${new Date(order.createdAt || Date.now()).toLocaleString()}
        </div>
        <button class="btn btn-primary" data-id="${order.id}">View Details</button>
      `;

      card.querySelector("button").onclick = () => {
        nav(`client-order.html?orderId=${order.id}`);
      };

      container.appendChild(card);
    });
  }

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      nav("login.html");
      return;
    }

    const q = query(
      collection(db, "orders"),
      where("clientId", "==", user.uid)
    );

    onSnapshot(q, (snapshot) => {
      const orders = snapshot.docs.map(doc => ({
        id: doc.id,
        ...doc.data()
      }));

      renderOrders(orders);
    });
  });
</script>
