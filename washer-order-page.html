<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Washer Order – Laundry Bubbles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin:0;
      font-family:Arial,sans-serif;
      background:linear-gradient(135deg,#d96e30,#f4c542);
      min-height:100vh;
      padding:20px;
      color:#5a3e2b;
    }
    h1 { text-align:center; margin-bottom:20px; }
    .card {
      background:#fff4d9;
      padding:20px;
      border-radius:16px;
      box-shadow:0 6px 16px rgba(0,0,0,0.25);
      max-width:520px;
      margin:0 auto 20px;
    }
    .label { font-weight:bold; }
    select, textarea {
      width:100%;
      padding:12px;
      margin-top:6px;
      border-radius:10px;
      border:2px solid #d96e30;
      background:white;
      box-sizing:border-box;
    }
    textarea { height:80px; resize:none; }
    .btn {
      display:block;
      width:100%;
      padding:14px;
      background:#d96e30;
      color:white;
      text-align:center;
      border-radius:10px;
      font-weight:bold;
      text-decoration:none;
      margin-top:14px;
      border:none;
      cursor:pointer;
    }
    .secondary {
      background:#f4c542;
      color:#5a3e2b;
      border:2px solid #d96e30;
    }
    .small {
      font-size:0.85rem;
      opacity:0.8;
      margin-top:4px;
    }
  </style>
</head>

<body>
  <h1>Manage Order</h1>

  <div class="card" id="orderCard">Loading...</div>

  <div class="card">
    <h2>Update Status</h2>
    <select id="statusSelect">
      <option value="picked_up">Picked Up</option>
      <option value="washing">Washing</option>
      <option value="drying">Drying</option>
      <option value="folding">Folding</option>
      <option value="ready">Ready</option>
      <option value="delivered">Delivered</option>
    </select>

    <textarea id="message" placeholder="Optional message for the client"></textarea>

    <button class="btn" id="saveBtn">Save Update</button>
  </div>

  <div class="card">
    <h2>Live Location Sharing</h2>
    <button class="btn secondary" id="shareBtn">Share My Location</button>
    <div class="small" id="locationStatus">Location sharing is off.</div>
  </div>

  <a class="btn secondary" href="washer-orders.html">Back to Washer Orders</a>

  <!-- FIREBASE VERSION -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getAuth, 
      onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { 
      getFirestore,
      doc,
      getDoc,
      updateDoc,
      setDoc,
      collection,
      addDoc,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCRjiZum9L0UGLxDap4duEN3VIPj4PAmvo",
      authDomain: "launrdy-bubbles.firebaseapp.com",
      projectId: "launrdy-bubbles",
      storageBucket: "launrdy-bubbles.firebasestorage.app",
      messagingSenderId: "625079841514",
      appId: "1:625079841514:web:472b2721f4acb836111d93",
      measurementId: "G-QT16Z65J1E"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function getOrderId() {
      return new URLSearchParams(window.location.search).get("order_id");
    }

    const orderId = getOrderId();
    let watchId = null;

    const orderCard = document.getElementById("orderCard");
    const saveBtn = document.getElementById("saveBtn");
    const shareBtn = document.getElementById("shareBtn");
    const locationStatus = document.getElementById("locationStatus");

    let currentOrder = null;

    function renderOrder() {
      if (!currentOrder) return;

      const pickup = currentOrder.pickupTime
        ? new Date(currentOrder.pickupTime).toLocaleString()
        : "Not set";

      orderCard.innerHTML = `
        <div><span class="label">Order ID:</span> #${orderId}</div>
        <div><span class="label">Status:</span> ${currentOrder.status}</div>
        <div><span class="label">Loads:</span> ${currentOrder.loads || 0}</div>
        <div><span class="label">Pickup:</span> ${pickup}</div>
        <div><span class="label">Notes:</span> ${currentOrder.notes || "None"}</div>
      `;
    }

    async function updateStatus(uid) {
      const newStatus = document.getElementById("statusSelect").value;
      const message = document.getElementById("message").value;

      const ref = doc(db, "orders", orderId);

      await updateDoc(ref, {
        status: newStatus
      });

      await addDoc(collection(db, "order_events"), {
        orderId,
        washerId: uid,
        status: newStatus,
        message,
        createdAt: Date.now()
      });

      alert("Status updated!");
    }

    function startLocationSharing(uid) {
      if (!navigator.geolocation) {
        alert("Location not supported.");
        return;
      }

      if (watchId !== null) {
        alert("Location sharing already on.");
        return;
      }

      watchId = navigator.geolocation.watchPosition(
        async pos => {
          await setDoc(doc(db, "locations", uid), {
            lat: pos.coords.latitude,
            lng: pos.coords.longitude,
            updatedAt: Date.now()
          });

          locationStatus.innerText = "Location sharing is ON.";
        },
        err => {
          console.error(err);
          alert("Could not get your location.");
        },
        {
          enableHighAccuracy: true,
          maximumAge: 5000,
          timeout: 10000
        }
      );

      locationStatus.innerText = "Trying to get your location...";
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const ref = doc(db, "orders", orderId);

      // Real-time updates
      onSnapshot(ref, (snap) => {
        if (!snap.exists()) {
          orderCard.innerText = "Order not found.";
          return;
        }
        currentOrder = snap.data();
        renderOrder();
      });

      saveBtn.onclick = () => updateStatus(user.uid);
      shareBtn.onclick = () => startLocationSharing(user.uid);
    });
  </script>
</body>
</html>
