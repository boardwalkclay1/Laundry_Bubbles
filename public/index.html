<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Laundry Bubbles · Roll & Connect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- FAVICON + APP ICON -->
  <link rel="icon" type="image/png" href="/img/bubbles-logo.jpg" />
  <link rel="apple-touch-icon" href="/img/bubbles-logo.jpg" />

  <!-- SOCIAL PREVIEW -->
  <meta property="og:title" content="Laundry Bubbles · Roll & Connect" />
  <meta property="og:description" content="Fresh laundry delivered with care — pickup, wash, dry & fold." />
  <meta property="og:image" content="/img/bubbles-logo.jpg" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://your-domain.com" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Laundry Bubbles · Roll & Connect" />
  <meta name="twitter:description" content="Fresh laundry delivered with care — pickup, wash, dry & fold." />
  <meta name="twitter:image" content="/img/bubbles-logo.jpg" />

  <style>
    :root {
      --primary: #4da6ff;
      --accent: #7a5cff;
      --text: #f9fbff;
      --muted: #c9d2f0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background: url("/img/bubbles-index.jpg") center/cover no-repeat fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      color: var(--text);
      position: relative;
      overflow-x: hidden;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 0;
    }

    header {
      width: 100%;
      max-width: 700px;
      display: flex;
      justify-content: center;
      margin-bottom: 55px;
      z-index: 2;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .logo img {
      width: 240px;
      height: auto;
      filter: drop-shadow(0 0 20px rgba(77,166,255,0.55));
    }

    .logo-text {
      font-size: 28px;
      font-weight: 700;
      text-shadow: 0 0 16px rgba(0,0,0,0.7);
    }

    .hero {
      text-align: center;
      margin-top: 20px;
      z-index: 2;
    }

    .hero h1 {
      font-size: 38px;
      line-height: 1.2;
      margin-bottom: 16px;
      text-shadow: 0 0 16px rgba(0,0,0,0.7);
    }

    .hero p {
      font-size: 18px;
      color: var(--muted);
      margin-bottom: 38px;
      text-shadow: 0 0 12px rgba(0,0,0,0.6);
    }

    .btn {
      width: 100%;
      max-width: 360px;
      padding: 16px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 18px;
      margin: 14px auto;
      display: block;
      transition: 0.15s ease;
      z-index: 2;
      position: relative;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      box-shadow: 0 12px 28px rgba(77,166,255,0.45);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(77,166,255,0.6);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: var(--muted);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      color: #fff;
    }
  </style>
</head>

<body>

  <div class="overlay"></div>

  <header>
    <div class="logo">
      <img src="/img/bubbles-logo.jpg" alt="Laundry Bubbles Logo" />
      <div class="logo-text">Laundry Bubbles</div>
    </div>
  </header>

  <div class="hero">
    <h1>Fresh laundry,<br> delivered with care</h1>
    <p>Pickup, wash, dry & fold — powered by trusted local washers.</p>

    <button class="btn btn-primary" id="loginBtn">Log In</button>
    <button class="btn btn-secondary" id="signupBtn">Create Account</button>
  </div>

  <script>
    document.getElementById("loginBtn").onclick = () => {
      window.location.href = "/pages/login.html";
    };

    document.getElementById("signupBtn").onclick = () => {
      window.location.href = "/pages/signup.html";
    };
  </script>

</body>
</html>
