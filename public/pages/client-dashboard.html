<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Client Dashboard – Laundry Bubbles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- FAVICON -->
  <link rel="icon" type="image/png" href="../../img/bubbles-logo.jpg" />
  <link rel="apple-touch-icon" href="../../img/bubbles-logo.jpg" />

  <!-- SOCIAL PREVIEW -->
  <meta property="og:title" content="Laundry Bubbles – Client Dashboard" />
  <meta property="og:description" content="Find washers, request pickups, track orders, and manage your Laundry Bubbles account." />
  <meta property="og:image" content="../../img/bubbles-logo.jpg" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://your-domain.com/pages/client/client-dashboard.html" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Laundry Bubbles – Client Dashboard" />
  <meta name="twitter:description" content="Find washers, request pickups, track orders, and manage your Laundry Bubbles account." />
  <meta name="twitter:image" content="../../img/bubbles-logo.jpg" />

  <style>
    :root {
      --primary:#4da6ff;
      --accent:#7a5cff;
      --text:#f9fbff;
      --muted:#c9d2f0;
      --card:rgba(255,255,255,0.06);
    }

    * {
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:system-ui,sans-serif;
    }

    body {
      min-height:100vh;
      background:url("../../img/bubbles-index.jpg") center/cover no-repeat fixed;
      color:var(--text);
      padding:22px;
      position:relative;
      overflow-x:hidden;
    }

    .overlay {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.55);
      z-index:0;
    }

    header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:26px;
      position:relative;
      z-index:2;
    }

    .brand {
      display:flex;
      align-items:center;
      gap:16px;
    }

    .brand img {
      width:120px; /* BIG LOGO */
      height:auto;
      filter:drop-shadow(0 0 16px rgba(77,166,255,0.55));
    }

    .brand-text {
      font-size:26px;
      font-weight:700;
      text-shadow:0 0 16px rgba(0,0,0,0.7);
    }

    .avatar {
      width:48px;
      height:48px;
      border-radius:50%;
      background:rgba(255,255,255,0.1);
      border:1px solid rgba(255,255,255,0.2);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      cursor:pointer;
      backdrop-filter:blur(4px);
    }

    h1 {
      font-size:30px;
      margin-bottom:8px;
      text-shadow:0 0 16px rgba(0,0,0,0.7);
      position:relative;
      z-index:2;
    }

    .sub {
      font-size:16px;
      color:var(--muted);
      margin-bottom:22px;
      text-shadow:0 0 12px rgba(0,0,0,0.6);
      position:relative;
      z-index:2;
    }

    .mini-map {
      width:100%;
      height:200px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,0.18);
      overflow:hidden;
      position:relative;
      cursor:pointer;
      box-shadow:0 12px 30px rgba(0,0,0,0.55);
      margin-bottom:26px;
      backdrop-filter:blur(6px);
      z-index:2;
    }

    #miniMap { width:100%; height:100%; }

    .mini-map-label {
      position:absolute;
      left:12px;
      bottom:12px;
      background:rgba(3,7,21,0.85);
      padding:5px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.18);
      font-size:13px;
    }

    .mini-map-hint {
      position:absolute;
      right:12px;
      bottom:12px;
      font-size:11px;
      color:var(--muted);
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
      gap:18px;
      position:relative;
      z-index:2;
    }

    .card {
      background:var(--card);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:18px;
      padding:18px;
      cursor:pointer;
      transition:0.15s ease;
      box-shadow:0 10px 24px rgba(0,0,0,0.45);
      backdrop-filter:blur(6px);
    }

    .card:hover {
      transform:translateY(-3px);
      border-color:var(--primary);
      box-shadow:0 14px 30px rgba(77,166,255,0.45);
    }

    .card-title {
      font-size:17px;
      margin-bottom:6px;
      font-weight:600;
    }

    .card-sub {
      font-size:13px;
      color:var(--muted);
    }
  </style>
</head>

<body>

  <div class="overlay"></div>

  <header>
    <div class="brand">
      <img src="../../img/bubbles-logo.jpg" alt="Laundry Bubbles Logo" />
      <div class="brand-text">Laundry Bubbles</div>
    </div>
    <div class="avatar" id="avatarInitial">U</div>
  </header>

  <h1 id="greeting">Welcome back</h1>
  <p class="sub">Client mode · Find washers near you</p>

  <div class="mini-map" id="miniMapContainer">
    <div id="miniMap"></div>
    <div class="mini-map-label">Nearby washers</div>
    <div class="mini-map-hint">Tap to open full map</div>
  </div>

  <section class="grid">
    <div class="card" onclick="nav('client-map.html')">
      <div class="card-title">Find a washer</div>
      <div class="card-sub">See nearby washers on the map.</div>
    </div>

    <div class="card" onclick="nav('request-pickup.html')">
      <div class="card-title">Request pickup</div>
      <div class="card-sub">Schedule a pickup from your location.</div>
    </div>

    <div class="card" onclick="nav('../inbox.html')">
      <div class="card-title">Inbox</div>
      <div class="card-sub">Message washers about your loads.</div>
    </div>

    <div class="card" onclick="nav('../settings.html')">
      <div class="card-title">Settings</div>
      <div class="card-sub">Update your profile & switch modes.</div>
    </div>
  </section>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB02c_eleXuhHWdSMJzqk9mESbXn_PT2zc"></script>

  <script>
    function nav(page){ window.location.href = page; }

    document.getElementById("avatarInitial").onclick = () => nav("../settings.html");

    const washers = [
      { id:"w1", name:"BeltLine Bubbles", lat:33.7550, lng:-84.39 },
      { id:"w2", name:"Decatur Fresh Fold", lat:33.774, lng:-84.295 },
      { id:"w3", name:"Midtown Spin & Smile", lat:33.78, lng:-84.38 }
    ];

    function initMiniMap() {
      const defaultPos = { lat:33.7490, lng:-84.3880 };

      const map = new google.maps.Map(document.getElementById("miniMap"), {
        center: defaultPos,
        zoom: 12,
        disableDefaultUI: true,
        gestureHandling: "greedy",
        styles: [
          { elementType:"geometry", stylers:[{color:"#1d1d2b"}] },
          { elementType:"labels.text.fill", stylers:[{color:"#f9fbff"}] }
        ]
      });

      washers.forEach(w => {
        new google.maps.Marker({
          position:{lat:w.lat,lng:w.lng},
          map,
          icon:"https://maps.google.com/mapfiles/ms/icons/blue-dot.png"
        });
      });

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          const userPos = { lat:pos.coords.latitude, lng:pos.coords.longitude };
          map.setCenter(userPos);

          new google.maps.Marker({
            position:userPos,
            map,
            icon:"https://maps.google.com/mapfiles/ms/icons/red-dot.png"
          });
        });
      }

      document.getElementById("miniMapContainer").onclick = () => nav("client-map.html");
    }

    window.onload = initMiniMap;
  </script>

</body>
</html>
