<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Washer Dashboard – Laundry Bubbles</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #FFF4D9;
            color: #5A3E2B;
        }

        header {
            background: #D96E30;
            padding: 18px;
            text-align: center;
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .btn {
            display: block;
            background: #F4C542;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 14px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #5A3E2B;
            text-decoration: none;
            border: 2px solid #D96E30;
        }

        .btn:hover {
            background: #E3B63A;
        }

        .status-box {
            background: #ffe9b8;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-weight: bold;
            text-align: center;
            border: 2px solid #D96E30;
        }
    </style>
</head>

<body>
    <header>Washer Dashboard</header>

    <div class="container">
        <div id="statusBox" class="status-box">Checking account…</div>

        <a href="washer_accept.html" class="btn">View Available Jobs</a>
        <a href="washer_pickup.html" class="btn">Pickup Status</a>
        <a href="washer_dropoff.html" class="btn">Dropoff Status</a>
    </div>

    <!-- FIREBASE LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRjiZum9L0UGLxDap4duEN3VIPj4PAmvo",
            authDomain: "launrdy-bubbles.firebaseapp.com",
            projectId: "launrdy-bubbles",
            storageBucket: "launrdy-bubbles.firebasestorage.app",
            messagingSenderId: "625079841514",
            appId: "1:625079841514:web:472b2721f4acb836111d93",
            measurementId: "G-QT16Z65J1E"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const statusBox = document.getElementById("statusBox");

        async function loadWasher(uid) {
            const ref = doc(db, "users", uid);
            const snap = await getDoc(ref);

            if (!snap.exists()) {
                statusBox.textContent = "Account not found.";
                return;
            }

            const data = snap.data();

            if (data.role !== "washer") {
                statusBox.textContent = "You are not registered as a washer.";
                return;
            }

            if (data.verification_status === "pending") {
                statusBox.textContent = "Your washer verification is under review.";
            } else if (data.verification_status === "approved") {
                statusBox.textContent = "Washer account approved!";
            } else if (data.verification_status === "rejected") {
                statusBox.textContent = "Verification rejected — please update your info.";
            } else {
                statusBox.textContent = "Complete your washer verification.";
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }
            loadWasher(user.uid);
        });
    </script>
</body>
</html>
