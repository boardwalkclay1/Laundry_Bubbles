<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Payout settings – Laundry Bubbles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { --primary:#4da6ff;--accent:#7a5cff;--text:#f9fbff;--muted:#9aa3c7;--card:rgba(255,255,255,0.05); }
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif;}
    body{
      min-height:100vh;
      background:
        radial-gradient(circle at 20% 20%,rgba(77,166,255,0.18),transparent 60%),
        radial-gradient(circle at 80% 80%,rgba(122,92,255,0.18),transparent 60%),
        #030715;
      color:var(--text);
      padding:16px;
    }
    header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
    .back{
      width:34px;height:34px;border-radius:999px;
      border:1px solid rgba(255,255,255,0.16);
      background:rgba(5,7,18,0.9);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;font-size:16px;
    }
    h1{font-size:20px;margin-bottom:4px;}
    .sub{font-size:13px;color:var(--muted);margin-bottom:10px;}
    .card{
      background:var(--card);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:16px;
      padding:14px;
      margin-bottom:12px;
    }
    label{font-size:13px;color:var(--muted);display:block;margin-bottom:4px;}
    input{
      width:100%;padding:10px;border-radius:12px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.06);
      color:var(--text);
      margin-bottom:10px;
      font-size:14px;
    }
    .btn{
      width:100%;padding:12px;border-radius:999px;
      border:none;cursor:pointer;font-weight:600;font-size:16px;margin-top:6px;
    }
    .btn-primary{
      background:linear-gradient(135deg,var(--primary),var(--accent));
      color:#fff;
      box-shadow:0 12px 28px rgba(77,166,255,0.45);
    }
    .hint{font-size:11px;color:var(--muted);margin-top:6px;}
    .summary{font-size:13px;color:var(--muted);margin-top:8px;}
  </style>
</head>
<body>
  <header>
    <div class="back" onclick="window.location.href='settings.html'">←</div>
    <div>
      <h1>Payout settings</h1>
      <p class="sub">Set how you receive your earnings.</p>
    </div>
  </header>

  <section class="card">
    <label>PayPal email</label>
    <input id="paypalEmailWasher" placeholder="washer@example.com" />
    <p class="hint">This is where your payouts will be sent.</p>
    <button class="btn btn-primary" id="saveBtn">Save payout method</button>
    <p class="summary" id="summaryText"></p>
  </section>

  <!-- FIREBASE LOGIC -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCRjiZum9L0UGLxDap4duEN3VIPj4PAmvo",
      authDomain: "launrdy-bubbles.firebaseapp.com",
      projectId: "launrdy-bubbles",
      storageBucket: "launrdy-bubbles.firebasestorage.app",
      messagingSenderId: "625079841514",
      appId: "1:625079841514:web:472b2721f4acb836111d93",
      measurementId: "G-QT16Z65J1E"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const paypalInput = document.getElementById("paypalEmailWasher");
    const saveBtn = document.getElementById("saveBtn");
    const summaryText = document.getElementById("summaryText");

    async function loadPayoutSettings(uid) {
      const ref = doc(db, "users", uid);
      const snap = await getDoc(ref);

      if (snap.exists()) {
        const data = snap.data();
        paypalInput.value = data.paypalEmail || "";
        summaryText.textContent = data.paypalEmail
          ? `Current payout email: ${data.paypalEmail}`
          : "No payout method saved yet.";
      }
    }

    async function savePayoutSettings(uid) {
      const email = paypalInput.value.trim();
      if (!email) {
        alert("Please enter a valid PayPal email.");
        return;
      }

      const ref = doc(db, "users", uid);
      await setDoc(ref, { paypalEmail: email }, { merge: true });

      summaryText.textContent = `Current payout email: ${email}`;
      alert("Payout method saved!");
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      loadPayoutSettings(user.uid);
      saveBtn.onclick = () => savePayoutSettings(user.uid);
    });
  </script>
</body>
</html>
